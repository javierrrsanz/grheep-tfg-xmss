name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

permissions:
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  determine-image-tag:
    name: Determine Image Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine tag from vendored x-heep
        id: get-tag
        run: |
          X_HEEP_URL="https://github.com/x-heep/x-heep.git"
          # Read the vendored x-heep revision from the vendor file
          X_HEEP_REV=$(grep -oP 'rev:\s*"\K[^"]+' hw/vendor/x-heep.vendor.hjson || echo "")
          if [ -z "$X_HEEP_REV" ]; then
            echo "Could not determine x-heep revision, defaulting to 'latest'"
            echo "tag=latest" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Vendored x-heep commit: $X_HEEP_REV"
          # Clone x-heep (treeless) to resolve the commit to a version tag
          git clone --bare --filter=tree:0 "$X_HEEP_URL" /tmp/x-heep-bare
          TAG_NAME=$(git -C /tmp/x-heep-bare describe --tags --abbrev=0 --match "v*" "$X_HEEP_REV" 2>/dev/null || echo "")
          rm -rf /tmp/x-heep-bare
          if [ -z "$TAG_NAME" ]; then
            echo "No matching tag found, defaulting to 'latest'"
            TAG_NAME="latest"
          fi
          echo "Detected tag: $TAG_NAME"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

  simulate-apps:
    name: Simulate All Apps
    runs-on: ubuntu-latest
    needs: [determine-image-tag, lint, check-vendor, black-formatter]
    container:
      image: ghcr.io/x-heep/x-heep/x-heep-toolchain:${{ needs.determine-image-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Python dependencies
        shell: bash -l {0}
        run: pip install -r hw/vendor/x-heep/util/python-requirements.txt
      - name: Compile and simulate all apps
        shell: bash -l {0}
        run: |
          make mcu-gen && \
          python3 test/gr_heep_test_apps.py

  lint:
    name: Lint Generated Files
    runs-on: ubuntu-latest
    needs: determine-image-tag
    container:
      image: ghcr.io/x-heep/x-heep/x-heep-toolchain:${{ needs.determine-image-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Python dependencies
        shell: bash -l {0}
        run: pip install -r hw/vendor/x-heep/util/python-requirements.txt
      - name: Mark Repository as Safe
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Check generated file consistency
        shell: bash -l {0}
        run: |
          make mcu-gen && \
          hw/vendor/x-heep/util/git-diff.py --error-msg '::error ::Found differences in generated files.'

  check-vendor:
    name: Vendor up-to-date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Install requirements
        run: pip install -r hw/vendor/x-heep/util/python-requirements.txt
      - name: Re-vendor and diff
        run: |
          find hw/vendor -maxdepth 1 -type f -name '*.vendor.hjson' | xargs -n1 util/vendor.py --verbose &&
          hw/vendor/x-heep/util/git-diff.py --error-msg '::error ::Found differences, please re-vendor.'

  black-formatter:
    name: Check Python code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: >
            config
            test
          version: "~= 24.8.0"
